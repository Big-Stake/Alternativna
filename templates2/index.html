<!DOCTYPE html>
<html>
<head>
    <title>Socialna platforma</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Socialna platforma</h1>

<p>{{ session.username }}</p>

<a href="/create_post">Nova objava</a>
|
<a href="/profile">Profil</a>
|
<a href="/logout">Odjava</a>

<hr>

{% for post in posts %}

<div class="post">

    <h3>
        {{ post.username }}
    </h3>

    <p>
        {{ post.text }}
    </p>

    {% if post.image %}

    <img
        src="{{ url_for('static',
        filename='slike/' + post.image) }}"
        width="300">

    {% endif %}

</div>

{% endfor %}

</body>
</html>
