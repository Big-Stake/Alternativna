<!DOCTYPE html>
<html>
<head>
    <title>Prijava</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Prijava</h1>

<form method="POST">

    <input
        type="text"
        name="username"
        placeholder="Uporabniško ime"

        type="password"
        name="password"
        placeholder="Geslo"
        required>

    <button type="submit">
        Prijava

</form>

<p>
    <a href="/register">
        Registracija
    </a>
</p>

</body>
</html>
