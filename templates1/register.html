<!DOCTYPE html>

<html>
<head>
    <title>Registracija</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Registracija</h1>

<form method="POST">

<input
    type="text"
    name="username"
    placeholder="Uporabniško ime"
    required>

<br><br>

<input
    type="password"
    name="password"
    placeholder="Geslo"
    required>

<br><br>

<button type="submit">Registracija</button>


</form>

<p>
    Že imaš račun?
    <a href="/login">Prijava</a>
</p>

</body>
</html>
